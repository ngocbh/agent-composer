site_name: The Agent Composer
site_description: Bridging the trust gap between humans and agents — a readable, Docker-Compose-shaped YAML surface where both people and LLMs compose, inspect, and refine agent workflows.
site_url: https://agent-composer.readthedocs.io
repo_url: https://github.com/ngocbh/agent-composer
repo_name: ngocbh/agent-composer
edit_uri: edit/main/docs/

# This config lives at the repo root; docs sources are in docs/.
docs_dir: docs
site_dir: site

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - content.code.copy
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_root_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            show_source: false
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true
            members_order: source
            docstring_section_style: table
            filters: ["!^_"]

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Installation: installation.md
  - The ac CLI: cli.md
  - Flow syntax: syntax.md
  - Examples: examples.md
  - Python API: api.md
  - API Reference: reference.md
  - Roadmap:
    - TODO: backlog/TODO.md
    - Deferred: backlog/DEFER.md
    - Future: backlog/FUTURE.md
    - Done: backlog/DONE.md
    - Branches: backlog/BRANCHES.md
