# Typed output — an agent that emits a structured value, not just text.
#
# An agent's `output:` may be any declared shape. A bare `str`/`Literal[...]` keeps the
# agent a text producer; a record, number, bool, or list switches it to STRUCTURED
# GENERATION — the engine derives a schema from `output:` and asks the model to emit a
# conforming value (native structured output, or a JSON prompt-injection fallback for
# providers that lack it), validated at the write boundary like any other node output.
#
# `retries:` (default 2) caps the self-correction loop when the model deviates from the
# schema — the engine feeds the validation error back and re-asks.
#
#   ac run typed_output.yaml --input text="Ada scored a 9 out of 10."

id: typed-output
name: typed_output
description: An agent declaring a record output -> structured generation.

input:
  text: str

nodes:
  extract:
    kind: agent
    mode: plain
    retries: 3                    # extra self-correction attempts (default 2)
    input:
      text: ${input.text}
    output:                       # a record shape -> structured generation
      name: str
      score: int
    prompt: |-
      Extract the person's name and their 0-10 score from the text below.
      Text: ${text}

output: ${extract.output}
