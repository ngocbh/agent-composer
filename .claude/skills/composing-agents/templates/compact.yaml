# Compact (single-node) flow — the flow IS one node.
# Run:  ac run compact.yaml --input name=Ada   (needs a model provider configured)
#
# When a flow has exactly one node, skip the `nodes:` map and the redundant
# `output: ${node.output}` line — put the node `kind:` and its fields at the top
# level. The flow `id:` names the node; the flow `input:` is the node signature
# (auto-wired by name, so you refer to it bare in the prompt); the flow `output:`
# is the node's output TYPE, re-exported as the flow output.
#
# Allowed only for the value-producing LEAF kinds: agent, code, model, tool,
# human_input. case/call/map reference other nodes a one-node flow has none of —
# use the full `nodes:` form (see minimal.yaml) for those.

id: greet
name: greet
description: A one-agent flow written inline — a name in, a greeting out.

input:
  name: str                  # auto-wired into the node as ${input.name}
output: str                  # the node's output TYPE; a record/number/list -> structured generation
kind: agent
prompt: |-
  Write a short, warm one-sentence greeting addressed to ${name}.
