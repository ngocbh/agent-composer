# Minimal flow — one AGENT, text in, text out.
# Run:  ac run minimal.yaml --input topic=clouds   (needs a model provider configured)
# Copy this as the starting point for any single-call flow.

id: minimal
name: minimal
description: A one-agent flow — a topic in, a paragraph out.

input:
  topic: str

nodes:
  answer:
    kind: agent
    input:
      topic: ${input.topic}        # bind the pool value to a LOCAL name
    output: str                    # text out; a record/number/list -> structured generation
    prompt: |-
      Write one clear paragraph about ${topic}.

output: ${answer.output}
