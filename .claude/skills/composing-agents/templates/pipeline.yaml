# Pipeline — an AGENT drafts TEXT, a CODE node parses it into a TYPED record.
# Use this when you want DETERMINISTIC post-processing of an agent's text (parsing,
# arithmetic, validation in code). To have the agent emit a structured value directly,
# declare the typed shape as its `output:` instead — see `typed_output.yaml`.
#
# Customize: point `code:` at an importable `module:function` on your PYTHONPATH.
#   def parse_note(inputs: dict) -> dict:   # receives its bound input record
#       text = inputs["text"]
#       return {"title": text.split("\n", 1)[0], "word_count": len(text.split())}

id: pipeline
name: pipeline
description: Agent drafts text; code parses it into a typed record.

typedefs:
  Parsed:                          # a record — fields recurse
    title: str
    word_count: int

input:
  topic: str

nodes:
  draft:
    kind: agent
    input:
      topic: ${input.topic}
    output: str
    prompt: "Write a short note about ${topic}."

  parse:
    kind: code
    input:
      text: ${draft.output}        # the reference IS the edge draft -> parse
    output: Parsed                 # unlike an AGENT, a CODE node may return ANY type
    code: your_package.parsing:parse_note

output: ${parse.output}
