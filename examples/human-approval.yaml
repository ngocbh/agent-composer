# human-approval — a deterministic human gate with the HUMAN_INPUT node.
#
# A HUMAN_INPUT node ALWAYS suspends the run at a fixed point in the graph and waits
# for a typed answer from the human; the answer is validated against the node's declared
# `output:` type before the flow continues. (Contrast with the `ask_user` control —
# see ask-user.yaml — which is model-CHOSEN, not guaranteed.)
#
# The flow: an agent drafts a short plan, a HUMAN_INPUT node asks the human to approve
# or revise it, `case ... on` routes on the typed answer, and whichever branch ran is
# combined by an n-ary `|` coalesce into the flow output.
#
# Exercises: a Literal typedef as the human answer, the HUMAN_INPUT node (suspend/resume
# with a typed answer), `case ... on` with `else`, and a coalesce join.
#
# Run it with (the CLI will pause and prompt you for the approval):
#   ac run examples/human-approval.yaml --input task="Plan a team offsite"

id: human-approval
name: human_approval
description: Draft a plan, ask a human to approve or revise it, then finalize accordingly.

typedefs:
  Approval: Literal[approve, revise]    # the typed human answer (a tag-only enum)

input:
  task: str

nodes:
  draft:
    kind: agent
    input:
      task: ${input.task}
    output: str
    prompt: "Draft a short, concrete plan (exactly 3 numbered steps) for: ${task}"

  approve:
    kind: human_input
    input:
      plan: ${draft.output}              # context the prompt may reference (bare ${plan})
    prompt: |-
      Here is the proposed plan:

      ${plan}

      Approve it as-is, or send it back to be revised? (approve / revise)
    output: Approval                     # the human's answer, validated against Approval's tags

  gate:
    kind: case                           # route on the human's answer (simple form)
    on: ${approve.output}
    cases:
      - when: approve
        then: kickoff
    else: revise_plan

  kickoff:
    kind: agent
    input:
      plan: ${draft.output}
    output: str
    prompt: "The plan was approved. Write a short, upbeat kickoff message for it:\n\n${plan}"

  revise_plan:
    kind: agent
    input:
      plan: ${draft.output}
    output: str
    prompt: "The plan needs work. Rewrite it tighter and clearer, keeping 3 steps:\n\n${plan}"

# kickoff runs on approve; revise_plan runs otherwise. Coalesce picks whichever ran.
output: ${kickoff.output | revise_plan.output}
