# ask-user — a model-CHOSEN clarifying question via the ask_user control.
#
# `ask_user` is a *control tool* granted to a `tool_calling` agent. Granting it only
# ENABLES the capability: the agent suspends to ask the human ONLY when the model
# decides it needs a fact it can't supply itself, then resumes with the answer fed back
# as the tool result. (Contrast with the HUMAN_INPUT node — see human-approval.yaml —
# which ALWAYS pauses at a fixed point. For a guaranteed gate, use HUMAN_INPUT; for an
# agent that asks "only if needed", use this.)
#
# Because it is model-chosen, whether the pause happens depends on the prompt AND the
# model: a tool-capable model that judges the request ambiguous will call ask_user; a
# request that is already clear (or a weak model) may just answer outright.
#
# Exercises: an AGENT in `tool_calling` mode with a `controls:` list and no ordinary
# tools — the loop binds ask_user, suspends on the call, and resumes with the answer.
#
# Run it with a deliberately ambiguous request (the CLI will prompt if the agent asks):
#   ac run examples/ask-user.yaml --input request="Book me a table for dinner"

id: ask-user
name: ask_user_clarify
description: An agent that asks the user a clarifying question only when the request is ambiguous.

input:
  request: str

nodes:
  assistant:
    kind: agent
    mode: tool_calling                   # the loop — required for the agent to call a control
    controls: [ask_user]                 # enable the ask_user capability (no ordinary tools here)
    input:
      request: ${input.request}
    output: str
    prompt: |-
      The user asks: ${request}

      If a detail essential to a good answer is missing or ambiguous, call ask_user
      ONCE to get exactly that detail. Otherwise, answer directly. When you have what
      you need, give a single clear, self-contained answer — do not ask twice.

output: ${assistant.output}
